<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paradel Peluquería</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f9f9f9;
      color: #333;
      text-align: center;
    }
    header {
      background: #222;
      color: #fff;
      padding: 20px;
    }
    h1 {
      margin: 0;
    }
    .servicios {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin: 10px;
      width: 250px;
      padding: 15px;
    }
    .card img {
      width: 100%;
      border-radius: 8px;
    }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    footer {
      background: #222;
      color: #fff;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Paralelo Peluquería</h1>
    <p>Tu estilo, nuestra pasión</p>
  </header>

  <section class="servicios">
    <div class="card">
      <img src="corte.jpg" alt="Corte de cabello">
      <h3>Corte de Cabello</h3>
      <p>Clásico, moderno o personalizado.</p>
    </div>
    <div class="card">
      <img src="tinte.jpg" alt="Tinte de cabello">
      <h3>Tinte</h3>
      <p>Colores vibrantes y duraderos.</p>
    </div>
    <div class="card">
      <img src="peinado.jpg" alt="Peinado">
      <h3>Peinados</h3>
      <p>Para eventos y ocasiones especiales.</p>
    </div>
  </section>

  <a class="btn" href="https://wa.me/5351234567" target="_blank">
    Reservar por WhatsApp
  </a>

  <footer>
    <p>📍 Jaruco, Mayabeque| 📞 +53 54819489</p>
  </footer>
</body>
</html>
